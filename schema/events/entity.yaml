domain: entity
events:
  - name: hurt
    id: 35
    input:
      - { name: entity, type: entity_id }
      - { name: source, type: damage_source }
      - { name: health, type: f64 }
      - { name: max_health, type: f64 }
    state:
      - { name: damage, type: f64 }
      - { name: cancelled, type: bool }
  - name: heal
    id: 36
    input:
      - { name: entity, type: entity_id }
      - { name: source, type: healing_source }
      - { name: health, type: f64 }
      - { name: max_health, type: f64 }
    state:
      - { name: health, type: f64 }
      - { name: cancelled, type: bool }
  - name: death
    id: 37
    input:
      - { name: entity, type: entity_id }
      - { name: source, type: damage_source }
      - { name: health, type: f64 }
      - { name: damage, type: f64 }
    state:
      - { name: cancelled, type: bool }
