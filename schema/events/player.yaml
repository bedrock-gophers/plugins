domain: player
events:
  - name: move
    id: 1
    input:
      - { name: player, type: player_id }
      - { name: old_position, type: vec3 }
      - { name: new_position, type: vec3 }
      - { name: rotation, type: rotation }
    state:
      - { name: cancelled, type: bool }
  - name: chat
    id: 2
    input:
      - { name: player, type: player_id }
      - { name: message, type: string_view }
    state:
      - { name: cancelled, type: bool }
      - { name: has_replacement, type: bool }
      - { name: replacement, type: string_buffer }
  - name: join
    id: 3
    input:
      - { name: player, type: player_id }
      - { name: name, type: string_view }
    state:
      - { name: cancelled, type: bool }
  - name: quit
    id: 4
    input:
      - { name: player, type: player_id }
      - { name: name, type: string_view }
    state: []
  - name: hurt
    id: 5
    input:
      - { name: player, type: player_id }
      - { name: immune, type: bool }
      - { name: source, type: string_view }
    state:
      - { name: cancelled, type: bool }
      - { name: damage, type: f64 }
      - { name: attack_immunity_milliseconds, type: u64 }
  - name: heal
    id: 6
    input:
      - { name: player, type: player_id }
      - { name: source, type: string_view }
    state:
      - { name: cancelled, type: bool }
      - { name: health, type: f64 }
  - name: block_break
    id: 7
    input:
      - { name: player, type: player_id }
      - { name: position, type: block_pos }
      - { name: block, type: string_view }
    state:
      - { name: cancelled, type: bool }
      - { name: experience, type: i32 }
  - name: block_place
    id: 8
    input:
      - { name: player, type: player_id }
      - { name: position, type: block_pos }
      - { name: block, type: string_view }
    state:
      - { name: cancelled, type: bool }
  - name: food_loss
    id: 9
    input:
      - { name: player, type: player_id }
      - { name: from, type: i32 }
    state:
      - { name: cancelled, type: bool }
      - { name: to, type: i32 }
  - name: death
    id: 10
    input:
      - { name: player, type: player_id }
      - { name: source, type: string_view }
    state:
      - { name: keep_inventory, type: bool }
  - name: start_break
    id: 11
    input:
      - { name: player, type: player_id }
      - { name: position, type: block_pos }
    state:
      - { name: cancelled, type: bool }
  - name: fire_extinguish
    id: 12
    input:
      - { name: player, type: player_id }
      - { name: position, type: block_pos }
    state:
      - { name: cancelled, type: bool }
  - name: toggle_sprint
    id: 13
    input:
      - { name: player, type: player_id }
      - { name: after, type: bool }
    state:
      - { name: cancelled, type: bool }
  - name: toggle_sneak
    id: 14
    input:
      - { name: player, type: player_id }
      - { name: after, type: bool }
    state:
      - { name: cancelled, type: bool }
  - name: jump
    id: 15
    input:
      - { name: player, type: player_id }
    state: []
  - name: teleport
    id: 16
    input:
      - { name: player, type: player_id }
      - { name: position, type: vec3 }
    state:
      - { name: cancelled, type: bool }
