states:
  - name: game_mode
    id: 0
    type: game_mode
    set: SetGameMode
    get: GameMode
    rust_set: set_game_mode
    rust_get: game_mode
    adapter: game_mode
  - name: heal
    id: 1
    type: f64
    set: Heal
    rust_set: heal
    adapter: healing_source
    validate: non_negative
  - name: hurt
    id: 2
    type: f64
    set: Hurt
    rust_set: hurt
    adapter: damage_source
    validate: non_negative
  - name: food
    id: 3
    type: i32
    set: SetFood
    get: Food
    rust_set: set_food
    rust_get: food
  - name: max_health
    id: 4
    type: f64
    set: SetMaxHealth
    get: MaxHealth
    rust_set: set_max_health
    rust_get: max_health
    validate: positive
  - name: health
    id: 5
    type: f64
    get: Health
    rust_get: health
  - name: experience_level
    id: 6
    type: i32
    set: SetExperienceLevel
    get: ExperienceLevel
    rust_set: set_experience_level
    rust_get: experience_level
    validate: non_negative
  - name: experience_progress
    id: 7
    type: f64
    set: SetExperienceProgress
    get: ExperienceProgress
    rust_set: set_experience_progress
    rust_get: experience_progress
    validate: unit_interval
  - name: scale
    id: 8
    type: f64
    set: SetScale
    get: Scale
    rust_set: set_scale
    rust_get: scale
  - name: invisible
    id: 9
    type: bool
    set: SetInvisible
    unset: SetVisible
    get: Invisible
    rust_set: set_invisible
    rust_get: invisible
    adapter: toggle
  - name: immobile
    id: 10
    type: bool
    set: SetImmobile
    unset: SetMobile
    get: Immobile
    rust_set: set_immobile
    rust_get: immobile
    adapter: toggle

texts:
  - { name: message, id: 0, set: Message, rust: message }
  - { name: tip, id: 1, set: SendTip, rust: send_tip }
  - { name: popup, id: 2, set: SendPopup, rust: send_popup }
  - { name: jukebox_popup, id: 3, set: SendJukeboxPopup, rust: send_jukebox_popup }
  - { name: name_tag, id: 4, set: SetNameTag, rust: set_name_tag }

effects:
  - { name: speed, id: 1, kind: lasting }
  - { name: slowness, id: 2, kind: lasting }
  - { name: haste, id: 3, kind: lasting }
  - { name: mining_fatigue, id: 4, kind: lasting }
  - { name: strength, id: 5, kind: lasting }
  - { name: instant_health, id: 6, kind: instant }
  - { name: instant_damage, id: 7, kind: instant }
  - { name: jump_boost, id: 8, kind: lasting }
  - { name: nausea, id: 9, kind: lasting }
  - { name: regeneration, id: 10, kind: lasting }
  - { name: resistance, id: 11, kind: lasting }
  - { name: fire_resistance, id: 12, kind: lasting }
  - { name: water_breathing, id: 13, kind: lasting }
  - { name: invisibility, id: 14, kind: lasting }
  - { name: blindness, id: 15, kind: lasting }
  - { name: night_vision, id: 16, kind: lasting }
  - { name: hunger, id: 17, kind: lasting }
  - { name: weakness, id: 18, kind: lasting }
  - { name: poison, id: 19, kind: lasting }
  - { name: wither, id: 20, kind: lasting }
  - { name: health_boost, id: 21, kind: lasting }
  - { name: absorption, id: 22, kind: lasting }
  - { name: saturation, id: 23, kind: instant }
  - { name: levitation, id: 24, kind: lasting }
  - { name: fatal_poison, id: 25, kind: lasting }
  - { name: conduit_power, id: 26, kind: lasting }
  - { name: slow_falling, id: 27, kind: lasting }
  - { name: darkness, id: 30, kind: lasting }
